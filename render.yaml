services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: squadiq-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DEMO_MODE
        value: "true"

      # MongoDB Atlas connection string — fill in after creating a cluster
      - key: MONGODB_URI
        sync: false

      # Auth — auto-generated on first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d

      # Anthropic — paste your key in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-opus-4-5

      # Set to your Render static-site URL once the client is deployed,
      # e.g. https://squadiq-client.onrender.com
      - key: CLIENT_ORIGIN
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: static
    name: squadiq-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set to your Render server URL once the server is deployed,
      # e.g. https://squadiq-server.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback — all paths served by index.html
      - type: rewrite
        source: /*
        destination: /index.html
