version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: squadiq-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: squadiq

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: squadiq-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/squadiq
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: squadiq-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo_data:
